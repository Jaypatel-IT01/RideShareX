<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | RideShareX</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body class="auth-page">


    <!-- NAVBAR -->

    <header class="navbar">

        <div class="container nav-container">

            <a href="/" class="logo">
                Ride<span>ShareX</span>
            </a>

            <a href="/" class="back-home">
                ← Back to Home
            </a>

        </div>

    </header>



    <!-- LOGIN SECTION -->

    <main class="auth-section">

        <div class="auth-card">


            <div class="auth-header">

                <div class="auth-logo">
                    🚗
                </div>

                <h1>
                    Welcome Back
                </h1>

                <p>
                    Login to continue your RideShareX journey.
                </p>

            </div>



            <!-- LOGIN FORM -->

            <form action="/login"
                  method="POST"
                  class="auth-form">


                <div class="form-group">

                    <label for="email">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    >

                </div>



                <div class="form-group">

                    <label for="password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                    >

                </div>



                <div class="form-options">

                    <label class="remember-me">

                        <input
                            type="checkbox"
                            name="remember"
                        >

                        Remember me

                    </label>


                    <a href="#">
                        Forgot Password?
                    </a>

                </div>



                <button
                    type="submit"
                    class="btn btn-primary auth-btn">

                    Login →

                </button>


            </form>



            <!-- REGISTER LINK -->

            <div class="auth-footer">

                <p>
                    Don't have an account?
                    <a href="/register">
                        Create an account
                    </a>
                </p>

            </div>


        </div>

    </main>



    <!-- FOOTER -->

    <footer class="auth-bottom">

        <p>
            © 2026 RideShareX. All rights reserved.
        </p>

    </footer>


</body>

</html>
