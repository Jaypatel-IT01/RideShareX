<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | RideShareX</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body class="auth-page">


    <!-- NAVBAR -->

    <header class="navbar">

        <div class="container nav-container">

            <a href="/" class="logo">
                Ride<span>ShareX</span>
            </a>

            <a href="/" class="back-home">
                ← Back to Home
            </a>

        </div>

    </header>



    <!-- REGISTER SECTION -->

    <main class="auth-section">

        <div class="auth-card register-card">


            <!-- HEADER -->

            <div class="auth-header">

                <div class="auth-logo">
                    🚗
                </div>

                <h1>
                    Create Your Account
                </h1>

                <p>
                    Join RideShareX and start sharing your journey.
                </p>

            </div>



            <!-- REGISTER FORM -->

            <form action="/register"
                  method="POST"
                  class="auth-form">


                <!-- FULL NAME -->

                <div class="form-group">

                    <label for="name">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Enter your full name"
                        required
                    >

                </div>



                <!-- EMAIL -->

                <div class="form-group">

                    <label for="email">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    >

                </div>



                <!-- PHONE -->

                <div class="form-group">

                    <label for="phone">
                        Phone Number
                    </label>

                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="Enter your phone number"
                        required
                    >

                </div>



                <!-- USER TYPE -->

                <div class="form-group">

                    <label for="user_type">
                        I want to
                    </label>

                    <select
                        id="user_type"
                        name="user_type"
                        required
                    >

                        <option value="">
                            Select an option
                        </option>

                        <option value="passenger">
                            Find rides as a Passenger
                        </option>

                        <option value="driver">
                            Offer rides as a Driver
                        </option>

                        <option value="both">
                            Find and Offer rides
                        </option>

                    </select>

                </div>



                <!-- PASSWORD -->

                <div class="form-group">

                    <label for="password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create a password"
                        required
                    >

                </div>



                <!-- CONFIRM PASSWORD -->

                <div class="form-group">

                    <label for="confirm_password">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Confirm your password"
                        required
                    >

                </div>



                <!-- TERMS -->

                <label class="terms-checkbox">

                    <input
                        type="checkbox"
                        name="terms"
                        required
                    >

                    <span>
                        I agree to the
                        <a href="#">
                            Terms & Conditions
                        </a>
                        and
                        <a href="#">
                            Privacy Policy
                        </a>
                    </span>

                </label>



                <!-- BUTTON -->

                <button
                    type="submit"
                    class="btn btn-primary auth-btn">

                    Create Account →

                </button>


            </form>



            <!-- LOGIN LINK -->

            <div class="auth-footer">

                <p>

                    Already have an account?

                    <a href="/login">
                        Login
                    </a>

                </p>

            </div>


        </div>

    </main>



    <!-- FOOTER -->

    <footer class="auth-bottom">

        <p>
            © 2026 RideShareX. All rights reserved.
        </p>

    </footer>


</body>

</html>
